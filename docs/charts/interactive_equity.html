</div>

let bm='none',ys='log',vw='all',al=false;

function interp(bd,bv,td){
  const m={};for(let i=0;i<bd.length;i++)m[bd[i]]=bv[i];
  const r=[];let lv=1;
  for(const d of td){if(m[d]!==undefined)lv=m[d];r.push(lv);}
  return r;
}

function render(){
  const traces=[],trs=[];
  let keys=Object.keys(D).sort();
  if(vw==='long')keys=keys.filter(l=>D[l].d[0]<'2015-01-01');
  if(vw==='short')keys=keys.filter(l=>D[l].d[0]>='2015-01-01');

  let commonStart=null;
  if(al){
    const starts=keys.map(l=>D[l].d[0]).sort();
    commonStart=starts[starts.length-1];
  }

  let bd=null,bv=null;
  if(bm!=='none'&&D[bm]){bd=D[bm].d;bv=D[bm].v;}

  for(const l of keys){
    const s=D[l];
    let dates=s.d.slice(),vals=s.v.slice();

    if(al&&commonStart){
      const idx=dates.findIndex(d=>d>=commonStart);
      if(idx<0)continue;
      dates=dates.slice(idx);
      const v0=vals[idx]||1;
      vals=vals.slice(idx).map(v=>v/v0);
    }

    let yv=vals;
    if(bd&&l!==bm){
      const bi=interp(bd,bv,dates);
      const b0=bi[0]||1;
      const v0=yv[0]||1;
      yv=yv.map((v,i)=>(v/v0)/(bi[i]/b0));
    }

    const ret=((yv[yv.length-1]/yv[0])-1)*100;
    traces.push({x:dates,y:yv,type:'scatter',mode:'lines',
      name:l+': '+s.name,line:{color:s.color,width:2},
      hovertemplate:'<b>'+l+': '+s.name+'</b><br>%{x}<br>净值: %{y:.3f}<extra></extra>'});

    const cc=s.calmar>=1?'g':s.calmar>=0.5?'y':'r';
    const gc=s.cagr>=15?'g':s.cagr>=8?'y':'r';
    trs.push('<tr><td style="color:'+s.color+';font-weight:bold">'+l+'</td><td style="text-align:left">'+s.name+'</td><td><span class="tg '+gc+'">'+s.cagr+'%</span></td><td><span class="tg r">'+s.mdd+'%</span></td><td><span class="tg '+cc+'">'+s.calmar+'</span></td><td style="font-size:11px;color:#8b949e">'+s.d[0]+'</td><td style="color:'+(ret>=0?'#3fb950':'#f85149')+'">'+(ret>=0?'+':'')+ret.toFixed(1)+'%</td></tr>');
  }
  document.getElementById('tb').innerHTML=trs.join('');

  const ts=bm!=='none'?' (基准: '+D[bm].name+')':'';
  const layout={
    paper_bgcolor:'#0d1117',plot_bgcolor:'#0d1117',
    font:{color:'#c9d1d9',family:'-apple-system,sans-serif'},
    title:{text:'策略净值对比'+ts+(al?' [统一起点]':''),font:{size:15}},
    xaxis:{gridcolor:'#21262d',linecolor:'#30363d',
      rangeslider:{visible:true,bgcolor:'#161b22',bordercolor:'#30363d'},
      rangeselector:{buttons:[
        {count:1,label:'1月',step:'month',stepmode:'backward'},
        {count:3,label:'3月',step:'month',stepmode:'backward'},
        {count:6,label:'6月',step:'month',stepmode:'backward'},
        {count:1,label:'1年',step:'year',stepmode:'backward'},
        {count:3,label:'3年',step:'year',stepmode:'backward'},
        {count:5,label:'5年',step:'year',stepmode:'backward'},
        {step:'all',label:'全部'}],
        bgcolor:'#21262d',activecolor:'#1f6feb',bordercolor:'#30363d',font:{color:'#c9d1d9'}}},
    yaxis:{type:ys,gridcolor:'#21262d',linecolor:'#30363d',
      title:bm!=='none'?'相对净值':'净值 (起始=1)'},
    legend:{orientation:'h',y:-0.35,x:0.5,xanchor:'center',
      bgcolor:'rgba(13,17,23,0.8)',bordercolor:'#30363d',borderwidth:1,font:{size:11}},
    hovermode:'x unified',margin:{t:45,b:110,l:55,r:15},
    shapes:bm!=='none'?[{type:'line',x0:0,x1:1,y0:1,y1:1,xref:'paper',yref:'y',
      line:{color:'#484f58',width:1,dash:'dash'}}]:[]
  };
  const cfg={responsive:true,displayModeBar:true,displaylogo:false,
    modeBarButtonsToRemove:['lasso2d','select2d'],
    toImageButtonOptions:{format:'png',filename:'etf_equity',height:800,width:1400,scale:2}};
  Plotly.newPlot('chart',traces,layout,cfg);
}

document.getElementById('bm').onchange=function(){bm=this.value;render();};
function sy(s){ys=s;document.getElementById('bl').classList.toggle('act',s==='log');document.getElementById('bn').classList.toggle('act',s==='linear');render();}
function sv(v){vw=v;['ba','b1','b2'].forEach(id=>document.getElementById(id).classList.remove('act'));document.getElementById(v==='all'?'ba':v==='long'?'b1':'b2').classList.add('act');render();}
